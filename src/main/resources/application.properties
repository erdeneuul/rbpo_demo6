spring.application.name=demo
server.port=8443

# HTTPS / TLS configuration
server.ssl.enabled=true
server.ssl.key-store=classpath:keystore.p12
server.ssl.key-store-password=${KEYSTORE_PASSWORD:1BIB23423keystore}
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=1bib23423-server

# PostgreSQL connection
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/rental_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:20040517}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Disable Spring Security auto-generated password
spring.security.user.name=disabled
spring.security.user.password=disabled
